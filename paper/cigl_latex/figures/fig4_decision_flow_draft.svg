<?xml version="1.0" encoding="UTF-8"?>
<!-- F4 (DRAFT): negative-results decision flow. Hand-drawn; no data. The bounded scope is a RESULT of
     these checks, not a workaround. Pass/fail badges; dynamic-edge branch = "consistent with fingerprint
     risk, not causal". -->
<svg xmlns="http://www.w3.org/2000/svg" width="560" height="470" viewBox="0 0 560 470" font-family="sans-serif">
  <style>
    .box{fill:#eef3fb;stroke:#33558c;stroke-width:1.5}
    .t{font-size:12px;fill:#1c2a44}.s{font-size:10px;fill:#444}
    .pass{font-size:11px;fill:#1d6b2e;font-weight:bold}.fail{font-size:11px;fill:#9a2b2b;font-weight:bold}
    .ar{stroke:#33558c;stroke-width:1.6;fill:none;marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33558c"/></marker></defs>

  <text x="14" y="22" class="t" font-weight="bold">F4 (DRAFT) — how the negative results scoped the method</text>

  <rect class="box" x="120" y="40"  width="320" height="48"/>
  <text x="280" y="60" text-anchor="middle" class="t">3A-R: original graph backbone (GraphCMINet)</text>
  <text x="280" y="78" text-anchor="middle" class="fail">FAIL — near-chance under source-only (src &#8776; 0.33)</text>

  <rect class="box" x="120" y="116" width="320" height="48"/>
  <text x="280" y="136" text-anchor="middle" class="t">3A-S: known-good decoders (EEGNet/Shallow/Deep/DGCNN)</text>
  <text x="280" y="154" text-anchor="middle" class="pass">PASS — protocol learnable &#8658; backbone was the bottleneck</text>

  <rect class="box" x="120" y="192" width="320" height="58"/>
  <text x="280" y="211" text-anchor="middle" class="t">3A-G: graph-backbone redesign</text>
  <text x="280" y="228" text-anchor="middle" class="pass">PASS — static-adjacency DGCNN learns the task</text>
  <text x="280" y="244" text-anchor="middle" class="fail">dynamic-edge designs overfit (fingerprint risk, NOT causal)</text>

  <rect class="box" x="120" y="278" width="320" height="48"/>
  <text x="280" y="298" text-anchor="middle" class="t">3A-H: graph/node leakage audit</text>
  <text x="280" y="316" text-anchor="middle" class="pass">PASS — significant, clears within-label permutation null</text>

  <rect class="box" x="120" y="354" width="320" height="48" fill="#e9f6ec" stroke="#1d6b2e"/>
  <text x="280" y="374" text-anchor="middle" class="t">3A-I/J/K: fixed graph/node regularizer (&#955;=0.010)</text>
  <text x="280" y="392" text-anchor="middle" class="pass">PASS — partial reduction at source-task retention (2 datasets)</text>

  <path class="ar" d="M280,88 L280,114"/>
  <path class="ar" d="M280,164 L280,190"/>
  <path class="ar" d="M280,250 L280,276"/>
  <path class="ar" d="M280,326 L280,352"/>

  <text x="14" y="430" class="s">Each "fail" branch rules in the chosen scope: graph/node-only on static DGCNN; edge-CMI out of scope.</text>
  <text x="14" y="448" class="s">Schematic draft — qualitative gate decisions only; quantitative results are in Tables 2-5.</text>
</svg>
