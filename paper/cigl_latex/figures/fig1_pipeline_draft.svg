<?xml version="1.0" encoding="UTF-8"?>
<!-- F1 (DRAFT): CIGL pipeline schematic. Hand-drawn; no data. Bounded scope: graph/node only,
     static adjacency (edge_logits=None, no edge term), posterior-KL proxy. -->
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="sans-serif">
  <style>
    .box{fill:#eef3fb;stroke:#33558c;stroke-width:1.5;rx:6}
    .probe{fill:#fff7e6;stroke:#b5862a;stroke-width:1.3;stroke-dasharray:5 3}
    .t{font-size:12px;fill:#1c2a44}.s{font-size:10px;fill:#444}.pen{font-size:11px;fill:#8a3b1d}
    .ar{stroke:#33558c;stroke-width:1.6;fill:none;marker-end:url(#a)}
    .arp{stroke:#8a3b1d;stroke-width:1.4;fill:none;stroke-dasharray:4 2;marker-end:url(#ap)}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33558c"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8a3b1d"/></marker>
  </defs>

  <text x="14" y="22" class="t" font-weight="bold">F1 (DRAFT) — CIGL pipeline (graph/node only; static adjacency)</text>

  <!-- main forward path -->
  <rect class="box" x="14"  y="60" width="96"  height="44"/><text x="62"  y="80" text-anchor="middle" class="t">EEG x</text><text x="62" y="96" text-anchor="middle" class="s">[B,C,T]</text>
  <rect class="box" x="130" y="60" width="104" height="44"/><text x="182" y="80" text-anchor="middle" class="t">DGCNN</text><text x="182" y="96" text-anchor="middle" class="s">temporal stem</text>
  <rect class="box" x="254" y="60" width="116" height="44"/><text x="312" y="80" text-anchor="middle" class="t">static adjacency</text><text x="312" y="96" text-anchor="middle" class="s">ChebConv</text>
  <rect class="box" x="390" y="60" width="96"  height="44"/><text x="438" y="80" text-anchor="middle" class="t">node_z</text><text x="438" y="96" text-anchor="middle" class="s">per-electrode</text>
  <rect class="box" x="506" y="60" width="96"  height="44"/><text x="554" y="80" text-anchor="middle" class="t">graph_z</text><text x="554" y="96" text-anchor="middle" class="s">readout</text>
  <rect class="box" x="622" y="60" width="120" height="44"/><text x="682" y="80" text-anchor="middle" class="t">task logits</text><text x="682" y="96" text-anchor="middle" class="s">L_CE</text>

  <path class="ar" d="M110,82 L128,82"/><path class="ar" d="M234,82 L252,82"/>
  <path class="ar" d="M370,82 L388,82"/><path class="ar" d="M486,82 L504,82"/><path class="ar" d="M602,82 L620,82"/>

  <!-- Step-A posterior probes on detached features -->
  <rect class="probe" x="390" y="158" width="96" height="40"/><text x="438" y="178" text-anchor="middle" class="t">q_n(D|node_z,Y)</text><text x="438" y="192" text-anchor="middle" class="s">Step A (detached)</text>
  <rect class="probe" x="506" y="158" width="96" height="40"/><text x="554" y="178" text-anchor="middle" class="t">q_g(D|graph_z,Y)</text><text x="554" y="192" text-anchor="middle" class="s">Step A (detached)</text>
  <path class="arp" d="M438,104 L438,156"/><path class="arp" d="M554,104 L554,156"/>

  <!-- Step-B encoder penalties -->
  <text x="438" y="222" text-anchor="middle" class="pen">+ &#955;_n R_n(node_z;D|Y)</text>
  <text x="554" y="222" text-anchor="middle" class="pen">+ &#955;_g R_g(graph_z;D|Y)</text>
  <text x="496" y="244" text-anchor="middle" class="pen" font-weight="bold">posterior-KL proxy (NOT unbiased CMI) — Step B encoder penalty, &#955;=0.010</text>

  <!-- no-edge annotation -->
  <rect x="254" y="158" width="116" height="40" fill="#fbeeee" stroke="#8a3b1d" stroke-width="1.3" stroke-dasharray="3 2"/>
  <text x="312" y="178" text-anchor="middle" class="pen">edge_logits = None</text><text x="312" y="192" text-anchor="middle" class="s">no edge term / edge-CMI out of scope</text>
  <path class="arp" d="M312,104 L312,156"/>

  <text x="14" y="284" class="s">Source-only DG; target labels evaluation-only. Schematic draft — no measured values shown.</text>
</svg>
