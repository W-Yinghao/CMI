stage2_goal: eegnet_worldA_ceiling_plus_BC_refusal_robustness

world_A:
  include_backbones:
    - EEGNet
  exclude_backbones:
    TSMNet: oracle_unsupported_under_appended_nuisance_construction

world_B:
  include_backbones:
    - EEGNet
    - TSMNet

world_C:
  include_backbones:
    - EEGNet
    - TSMNet

datasets:
  - Lee2019_MI
  - Cho2017

seeds: [0, 1, 2]
source_subject_counts: [8, 16, 32, all]
folds: 15
alpha_grid: [0.25, 0.5, 1.0, 2.0]
n_pseudo: 8

nuisance_dim_mode: fraction_of_z_dim
nuisance_fraction: 0.20
nuisance_dim_min: 4

thresholds:
  safety_reject_task_drop_ucb: 0.02
  benefit_accept_lcb: 0.01
  domain_gain_role: diagnostic_only
  target_usage: audit_only

interventions:
  - identity
  - random_k
  - leace_baseline
  - rlace
  - tos_vd
  - inlp
  - tp_leace
  - alpha_leace
  - fair_conditional_leace_disjoint_router
  - oracle_nuisance_eraser_DIAGNOSTIC_ONLY

stop_conditions:
  false_accept: true
  target_leak_structural: true
  eegnet_worldA_clean_positives_per_n_source: true
  random_reproduces_eegnet_worldA_gain: true
  worldB_unsafe_accept: true
  worldC_principled_accept: true
  tsmnet_BC_degeneracy_gt_20pct: true
