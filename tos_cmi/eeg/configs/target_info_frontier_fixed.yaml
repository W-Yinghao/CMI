goal: target_information_needed_to_cross_source_only_ceiling
status: design_locked_frozen
frozen_hash: 3ad4ef312e325fa6
frozen_by: PM_approval_after_ceb00f8
frozen_hash_semantics: approved_content_hash_before_freeze_metadata
experiments_allowed: false
driver_allowed: false

budgets:
  B0_source_only:
    info: source_only
    accept_allowed: false

  B1_unlabeled_target:
    info: unlabeled_target_Z_or_X
    accept_allowed: false
    allowed_actions: [reject, abstain, request_labels]

  B2_k_labels_per_class:
    info: k_labeled_target_trials_per_class
    accept_allowed: true
    k_grid: [1, 2, 4, 8, 16]
    k_unavailable_policy: mark_unavailable_never_reuse_audit_labels

  B3_sequential_calibration:
    info: sequential_target_labels_with_early_stop
    accept_allowed: true
    k_grid: [1, 2, 4, 8, 16]
    active_query_policy: deferred
    k_unavailable_policy: mark_unavailable_never_reuse_audit_labels

  B4_oracle_selector:
    info: oracle_target_informed_selector
    accept_allowed: true
    diagnostic_only: true

split:
  repeats_R: 10
  stratify_by_class: true
  calibration_split: used_by_gate_only
  audit_split: final_evaluation_only
  paired_ci: subject_x_split_subject_clustered_bootstrap
  report_effective_n_per_class: true

gate:
  source_safety:
    reject_if_task_drop_ucb_gt: 0.02
  target_benefit:
    accept_if_calibration_dbacc_lcb_gt: 0.01
  domain_gain:
    role: diagnostic_only
  specificity_control:
    same_k_random_required: true
  unlabeled_target:
    accept_from_unlabeled_only: false

tier1_semi_synthetic:
  role: development
  datasets: [Lee2019_MI, Cho2017]
  backbones: [EEGNet]
  worlds:
    - v2_world_a_source_invisible
    - source_rich_world_a_source_visible
  budgets:
    - B0_source_only
    - B1_unlabeled_target
    - B2_k_labels_per_class
    - B3_sequential_calibration
    - B4_oracle_selector

tier2_real_eeg:
  role: false_accept_control
  datasets: [Lee2019_MI, Cho2017]
  backbones: [EEGNet, TSMNet]
  seeds: [0, 1, 2]
  folds: first15
  expectation: gate_still_rejects_or_abstains_no_target_beneficial_erasure_exists
  on_accept: audit_whether_accepted_target_gain_real_or_overfit
  secondary:
    datasets: [High-Gamma]
    role: four_class_stress_test

pass_fail:
  success_semi_synthetic:
    - target_label_budget_increases_true_accept_rate
    - false_accept_remains_near_zero
    - accepted_interventions_have_positive_held_out_target_gain
    - label_budget_curve_approaches_oracle
  success_real_eeg:
    - gate_does_not_spuriously_accept_useless_or_harmful_erasures
  failure:
    - few_shot_target_gate_overfits_and_false_accepts
    - unlabeled_target_screen_accepts_harmful_cells
    - sequential_calibration_fails_to_reduce_label_budget

forbidden_claims:
  - unsupervised_target_adaptation_from_unlabeled_only
  - active_learning_result_in_first_round
  - real_eeg_target_gain
  - source_rich_solves_source_only_acceptance

structural_checks:
  calibration_audit_disjoint: true
  audit_labels_read_before_scoring: false
  b1_accept_forbidden: true
  oracle_diagnostic_only: true

provenance:
  branch: science-target-info-v1
  parent_branch: science-source-rich-v1
  is_strict_source_only: false
  target_labels: object_of_study_but_never_decide_and_evaluate_with_same_labels
  freeze_hash_after: done_pm_approved_at_ceb00f8
  do_not_run_yet: true
