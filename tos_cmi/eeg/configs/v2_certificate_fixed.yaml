goal: source_only_acceptance_ceiling

datasets:
  - Lee2019_MI
  - Cho2017

backbones:
  - EEGNet
  - TSMNet

seeds: [0, 1, 2]
source_subject_counts: [8, 16, 32, all]
alpha_grid: [0.25, 0.5, 1.0, 2.0]
random_repeats: 8

safety_reject_task_drop_ucb: 0.02
benefit_accept_lcb: 0.01
domain_gain_role: diagnostic_only
target_usage: audit_only

nuisance_dim: 4
nuisance_noise: 0.1
worldA_variant: aligned_noise_flip
worldA_f_align: 0.15
worldB_beta: 1.0

world_A:
  role: target_beneficial_but_source_uncertifiable
  acceptance_expected: false
  diagnostic_oracle_expected: positive_target_gain
  gate_expected: reject_or_abstain

world_B:
  role: task_entangled_unsafe
  acceptance_expected: false
  gate_expected: reject

world_C:
  role: removable_but_useless_identity
  acceptance_expected: false
  gate_expected: reject_or_abstain

interventions:
  - identity
  - random_k
  - leace_baseline
  - rlace
  - tos_vd
  - inlp
  - tp_leace
  - alpha_leace
  - fair_conditional_leace_disjoint_router
  - oracle_nuisance_eraser_DIAGNOSTIC_ONLY
